name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate simulation core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Check UnityEngine boundary
        run: ./scripts/check-no-unityengine.sh

      - name: Check contract drift
        run: ./scripts/check-contract-drift.sh

      - name: Check consumer dependency boundary
        run: bash scripts/check-consumer-no-core.sh

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test

      - name: Smoke sample warehouse CLI
        run: bash scripts/smoke-sample-warehouse.sh

      - name: Smoke sample warehouse run-file CLI
        run: bash scripts/smoke-sample-warehouse-run-file.sh

      - name: Smoke export artifact
        run: bash scripts/smoke-export-artifact.sh
