name: Runtime CI

on:
  push:
    branches:
      - main
    paths:
      - "services/runtime/**"
      - "scripts/smoke-runtime.sh"
      - ".github/workflows/runtime-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "services/runtime/**"
      - "scripts/smoke-runtime.sh"
      - ".github/workflows/runtime-ci.yml"

jobs:
  runtime:
    name: Python runtime
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "services/runtime[dev]"

      - name: Smoke
        run: bash scripts/smoke-runtime.sh
